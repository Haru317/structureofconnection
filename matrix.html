<style>
:root{
  --bg:#fbfbfa;--bg-alt:#f7f8f8;--paper:#fffdfa;--ink:#121821;--ink-soft:#313947;--ink-quiet:#747b86;
  --gold:#c9a15f;--gold-dim:#8f7446;--line:rgba(201,161,95,.30);--line-soft:rgba(18,24,33,.08);
  --display:'Cormorant',serif;--body:'EB Garamond',serif;--utility:'Inter',sans-serif;--jp:'Noto Serif JP',serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg)}
body{padding-top:74px;overflow-x:hidden;color:var(--ink);font-family:var(--body);background:radial-gradient(ellipse at 50% 18%,rgba(255,255,255,.98),rgba(251,251,250,.86) 46%,rgba(246,247,247,.96) 100%)}
.matrix-page-bar{position:fixed;top:0;left:0;right:0;z-index:90;height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,255,255,.82));backdrop-filter:blur(16px);border-bottom:1px solid rgba(18,24,33,.06)}
.matrix-brand{text-decoration:none;color:var(--ink-soft);font-family:var(--utility);font-size:11px;letter-spacing:.16em}.matrix-brand strong{color:var(--gold-dim)}
.matrix-actions{display:flex;gap:10px;align-items:center}
.langbar{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:rgba(255,255,255,.76)}
.langbar button{border:0;background:transparent;color:var(--ink-quiet);font-family:var(--utility);font-weight:600;font-size:11px;padding:8px 16px;cursor:pointer;letter-spacing:.10em}
.langbar button.active{background:var(--gold-dim);color:#fff}
.matrix-home,.matrix-guide{padding:9px 13px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--gold-dim);background:rgba(255,255,255,.76);font:600 10px var(--utility);letter-spacing:.10em;text-transform:uppercase}
.matrix-viewport{width:100%;overflow:auto;padding:18px 0 30px;overscroll-behavior-x:contain}
.matrix-note{position:sticky;left:16px;z-index:5;display:inline-flex;margin:0 0 10px 16px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.90);border:1px solid var(--line);font:600 10px var(--utility);color:var(--gold-dim);letter-spacing:.05em}
.sheet{width:1920px;min-height:1080px;margin:0 16px;background:var(--paper);padding:16px 18px 14px;border:1px solid rgba(201,161,95,.22);position:relative;box-shadow:0 26px 76px rgba(18,24,33,.09)}
.top{display:grid;grid-template-columns:230px 1fr 430px;gap:14px;align-items:start;margin-bottom:10px}
.logo{font-family:var(--display);font-weight:500;font-size:86px;line-height:.8;color:var(--gold-dim);letter-spacing:-4px}
.title h1{font-family:var(--display);font-weight:500;font-size:38px;line-height:1.08;margin:0;color:var(--ink)}
.title p{font-family:var(--body);font-size:16px;margin:8px 0 0;font-weight:500;line-height:1.5;color:var(--ink-soft)}
.role{border:1px solid var(--line);border-radius:14px;padding:13px 16px;text-align:center;background:rgba(255,255,255,.76);font-size:13.5px;line-height:1.5;font-weight:500;color:var(--ink-soft)}
.main{display:grid;grid-template-columns:250px 1fr 330px;gap:10px}
.panel{border:1px solid rgba(18,24,33,.08);border-radius:14px;background:rgba(255,255,255,.76);overflow:hidden}
.panel h2{margin:0;background:linear-gradient(180deg,#242a33,#151a20);color:#fff;text-align:center;font-family:var(--utility);font-size:13px;padding:10px 8px;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.phases .phase{padding:14px 13px;border-bottom:1px solid var(--line-soft);min-height:122px;display:grid;grid-template-columns:50px 1fr;gap:11px;align-items:center;background:linear-gradient(90deg,rgba(201,161,95,.045),rgba(255,255,255,.10))}
.phase:last-child{border-bottom:0}
.icon{width:46px;height:46px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:26px;font-weight:500;color:var(--gold-dim);background:#fff}
.phase h3{margin:0 0 3px;font-family:var(--display);font-weight:500;font-size:19px;line-height:1.15;color:var(--ink)}
.phase p{margin:0;font-family:var(--body);font-size:13px;line-height:1.42;color:var(--ink-soft)}
.p1,.p2,.p3,.p4,.p5{color:var(--gold-dim)}
.matrix{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;background:#fff;border:1px solid var(--line-soft);border-radius:14px;overflow:hidden;font-family:var(--body);font-size:11.6px}
.matrix th{background:linear-gradient(180deg,#242a33,#151a20);color:#fff;border:1px solid rgba(255,255,255,.12);padding:8px 6px;line-height:1.25;text-align:center;font-family:var(--utility);font-size:10px;letter-spacing:.03em;font-weight:500}
.matrix td{border:1px solid rgba(18,24,33,.09);padding:7px 7px;vertical-align:top;line-height:1.36}
.matrix .phaseCell{font-family:var(--display);font-weight:500;text-align:center;vertical-align:middle;font-size:15px;line-height:1.22;color:var(--ink)!important;border-left:4px solid var(--phase-accent);border-right:1px solid rgba(18,24,33,.08);padding:10px 10px;background:linear-gradient(180deg,var(--phase-wash),rgba(255,255,255,.72));letter-spacing:0;overflow-wrap:anywhere;word-break:normal;hyphens:auto}
.matrix tr.phase-1{--phase-wash:#fbf5e9;--phase-accent:#c7a96d;background:#fffaf1!important}
.matrix tr.phase-2{--phase-wash:#f3f2ea;--phase-accent:#a8a57d;background:#f9f8f2!important}
.matrix tr.phase-3{--phase-wash:#f1ece5;--phase-accent:#b59b7a;background:#f8f4ef!important}
.matrix tr.phase-4{--phase-wash:#f0ecef;--phase-accent:#a98f9b;background:#f8f4f6!important}
.matrix tr.phase-5{--phase-wash:#ebeff0;--phase-accent:#8f9fa3;background:#f4f7f7!important}
.matrix tr.phase-start td{border-top:2px solid rgba(201,161,95,.28)}
.matrix tr.phase-start:first-child td{border-top-width:1px}
.matrix .stage{font-weight:600;color:var(--ink)}
.matrix .stage small{display:block;color:var(--ink-quiet);font-family:var(--utility);font-size:9px;font-weight:500;margin-top:3px;letter-spacing:.05em}
.matrix .drivers{font-weight:500}.matrix .mechanism,.matrix .method{color:var(--ink-soft)}.matrix .question{font-style:italic;color:#555d67}
.guide .item{display:grid;grid-template-columns:46px 1fr;gap:10px;padding:16px 12px;border-bottom:1px solid var(--line-soft);min-height:92px;align-items:center;background:linear-gradient(90deg,rgba(255,255,255,.46),rgba(201,161,95,.035))}
.guide .item:last-child{border-bottom:0}.guide .num{font-family:var(--display);font-size:30px;font-weight:500;text-align:center;color:var(--gold-dim)!important}.guide h3{margin:0 0 4px;font-family:var(--display);font-size:17px;font-weight:500;color:var(--ink)}.guide p{margin:0;font-size:13px;line-height:1.38;color:var(--ink-soft)}
.bottom{display:grid;grid-template-columns:1.3fr .85fr .85fr 1fr;gap:10px;margin-top:8px}
.box{border:1px solid rgba(18,24,33,.08);border-radius:14px;background:rgba(255,255,255,.78);padding:10px 13px;min-height:118px}
.box h3{margin:0 0 8px;text-align:center;color:var(--ink);font-family:var(--display);font-weight:500;font-size:16px}
.flow{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:12px;text-align:center;color:var(--ink-soft);font-weight:500;flex-wrap:wrap}.flow span{display:block;min-width:70px}.arrow{color:var(--gold-dim);font-size:16px}
.badge{display:inline-block;border-radius:999px;background:#faf7f0;border:1px solid rgba(201,161,95,.26);padding:2px 7px;margin:1px 2px;font-family:var(--utility);font-size:9.5px;font-weight:500;color:#6f6049}
.footer{margin-top:8px;text-align:center;font-family:var(--utility);font-size:10.5px;color:var(--ink-quiet);font-weight:500;letter-spacing:.03em}
@media(max-width:900px){.matrix .phaseCell{font-size:14px;padding:8px 7px}body{padding-top:62px}.matrix-page-bar{height:62px;padding:10px 12px}.matrix-brand span{display:none}.matrix-home,.matrix-guide{display:none}.matrix-viewport{padding-top:10px}.sheet{margin:0 8px}.langbar button{padding:7px 14px}}
@media print{body{background:#fff}.sheet{width:100%;min-height:auto;border:0;margin:0;box-shadow:none}.matrix-page-bar,.matrix-note{display:none}}
</style>

<header class="matrix-page-bar"><a class="matrix-brand matrix-return" data-page="index.html" href="index.html"><strong>HCE</strong><span>｜HUMAN CONNECTION ECOSYSTEM</span></a><div class="matrix-actions"><div class="langbar" aria-label="Language selection"><button id="btnEN">EN</button><button id="btnJP">日本語</button></div><a class="matrix-home matrix-return" data-page="index.html" href="index.html">Theory</a><a class="matrix-guide matrix-return" data-page="how-to-read.html" href="how-to-read.html">How to Read</a></div></header><div class="matrix-viewport"><div class="matrix-note">← Scroll horizontally / 横にスクロールして閲覧 →</div>
<div class="sheet">

  <div class="top">
    <div class="logo">HCE</div>
    <div class="title">
      <h1 data-jp="人間関係生態系フレームワーク" data-en="Human Connection Ecosystem Framework"></h1>
      <p data-jp="接続がどこで生まれ、止まり、深まり、断絶し、再接続し、時間を超えて意味を渡していくかを位置づける、関係システムの地図。" data-en="A relational-systems map for locating where connection forms, stalls, deepens, breaks, reconnects, and transmits meaning across time."></p>
    </div>
    <div class="role">
      <span data-jp="HCEの役割" data-en="Role of HCE"></span><br>
      <span data-jp="ゼロから新しい理論を発明することではなく、既存の理論を正しい住所に配置し、必要な知識が、必要な人に、必要な瞬間に届くようにすること。" data-en="Not to invent new theory from scratch, but to place existing theories at the right address, so the right knowledge reaches the right person at the right moment."></span>
    </div>
  </div>

  <div class="main">
    <div class="panel phases">
      <h2><span data-jp="HCE 5つのフェーズ" data-en="HCE 5 Phases"></span><br><span style="font-weight:400" data-jp="（時間の流れ）" data-en="(Flow of Time)"></span></h2>
      <div class="phase p1"><div class="icon">1</div><div><h3 data-jp="獲得" data-en="Acquisition"></h3><p><b data-jp="なぜ最初に近づくのか" data-en="Why approach at all?"></b><br><span data-jp="価値の認知、存在、最初の注目。" data-en="Value recognition, existence, and first attention."></span></p></div></div>
      <div class="phase p2"><div class="icon">2</div><div><h3 data-jp="関与" data-en="Engagement"></h3><p><b data-jp="なぜ関わり続けるのか" data-en="Why keep engaging?"></b><br><span data-jp="理解、共鳴、信頼形成。" data-en="Understanding, resonance, and trust formation."></span></p></div></div>
      <div class="phase p3"><div class="icon">3</div><div><h3 data-jp="維持" data-en="Retention"></h3><p><b data-jp="なぜ居続けるのか" data-en="Why stay?"></b><br><span data-jp="参加、投資、習慣。" data-en="Participation, investment, and habit."></span></p></div></div>
      <div class="phase p4"><div class="icon">4</div><div><h3 data-jp="統合" data-en="Integration"></h3><p><b data-jp="なぜ自分たちの一部になるのか" data-en="Why become part of it?"></b><br><span data-jp="自己概念、共有履歴、推奨。" data-en="Self-concept, shared history, and advocacy."></span></p></div></div>
      <div class="phase p5"><div class="icon">5</div><div><h3 data-jp="継承" data-en="Transmission"></h3><p><b data-jp="なぜ次世代へ渡るのか" data-en="Why pass it on?"></b><br><span data-jp="継承、制度化、文化的継続性。" data-en="Legacy, institution, and cultural continuity."></span></p></div></div>
    </div>

    <table class="matrix">
      <colgroup>
        <col style="width:112px"><col style="width:150px"><col style="width:180px"><col style="width:200px"><col style="width:230px"><col style="width:200px"><col style="width:170px"><col style="width:220px">
      </colgroup>
      <thead>
        <tr>
          <th data-jp="フェーズ" data-en="Phase"></th>
          <th data-jp="ステージ" data-en="Stage"></th>
          <th data-jp="ステージ定義" data-en="Stage Definition"></th>
          <th><span data-jp="HCEドライバー" data-en="HCE Drivers"></span><br><span style="font-weight:400" data-jp="（なぜ動くか）" data-en="(Why it moves)"></span></th>
          <th><span data-jp="メカニズム／理論ライブラリ" data-en="Mechanism / Theory Library"></span><br><span style="font-weight:400" data-jp="（なぜ機能するか）" data-en="(Why it works)"></span></th>
          <th><span data-jp="メソッド層" data-en="Method Layer"></span><br><span style="font-weight:400" data-jp="（どう介入するか）" data-en="(How to intervene)"></span></th>
          <th><span data-jp="クオリティファクター" data-en="Quality Factors"></span><br><span style="font-weight:400" data-jp="（何が効き方を変えるか）" data-en="(What modulates)"></span></th>
          <th data-jp="診断の問い" data-en="Diagnostic Question"></th>
        </tr>
      </thead>
      <tbody id="matrixBody"></tbody>
    </table>

    <div class="panel guide">
      <h2 data-jp="読み方ガイド" data-en="Reading Guide"></h2>
      <div class="item"><div class="num p1">1</div><div><h3 data-jp="フェーズを特定する" data-en="Identify the Phase"></h3><p data-jp="その人・顧客・集団・文化は、時間軸のどこにいるか？" data-en="Where in the time-flow is the person, customer, group, or culture located?"></p></div></div>
      <div class="item"><div class="num p2">2</div><div><h3 data-jp="ステージを特定する" data-en="Identify the Stage"></h3><p data-jp="今の詰まりや動きを説明する、正確な住所はどこか？" data-en="Which exact address explains the current blockage or movement?"></p></div></div>
      <div class="item"><div class="num p3">3</div><div><h3 data-jp="ドライバーを確認する" data-en="Check the Drivers"></h3><p data-jp="どの心理的・社会的・文化的な力が行動を生んでいるか？" data-en="Which psychological, social, or cultural force is creating action?"></p></div></div>
      <div class="item"><div class="num p4">4</div><div><h3 data-jp="クオリティファクターを適用する" data-en="Apply Quality Factors"></h3><p data-jp="共在×信頼×深さ×継続性が、実効的な強度を変える。" data-en="Shared Presence × Trust × Depth × Continuity changes the effective strength."></p></div></div>
      <div class="item"><div class="num p5">5</div><div><h3 data-jp="理論を接続する" data-en="Attach Theory"></h3><p data-jp="理論ライブラリは、装飾ではなく証拠として使う。" data-en="Use the theory library as evidence, not decoration."></p></div></div>
      <div class="item"><div class="num" style="color:#0D6A8B">6</div><div><h3 data-jp="次の一手を設計する" data-en="Design the Next Step"></h3><p data-jp="診断を、メソッド・境界・修復・儀式・再参入経路へ変換する。" data-en="Translate diagnosis into a method, boundary, repair, ritual, or re-entry path."></p></div></div>
    </div>
  </div>

  <div class="bottom">
    <div class="box">
      <h3 data-jp="ナビゲーション連鎖" data-en="Navigation Chain"></h3>
      <div class="flow">
        <span data-jp="問題" data-en="Problem"></span><b class="arrow">→</b>
        <span data-jp="フェーズ" data-en="Phase"></span><b class="arrow">→</b>
        <span data-jp="ステージ" data-en="Stage"></span><b class="arrow">→</b>
        <span data-jp="ドライバー" data-en="Driver"></span><b class="arrow">→</b>
        <span data-jp="クオリティ因子" data-en="Quality Factor"></span><b class="arrow">→</b>
        <span data-jp="メカニズム" data-en="Mechanism"></span><b class="arrow">→</b>
        <span data-jp="メソッド" data-en="Method"></span><b class="arrow">→</b>
        <span data-jp="次の一手" data-en="Next Step"></span>
      </div>
    </div>
    <div class="box">
      <h3 data-jp="クオリティ方程式" data-en="Quality Equation"></h3>
      <div class="note"><b data-jp="ドライバー × 共在 × 信頼 × 深さ × 継続性 ＝ 実効的な接続の強度。" data-en="Driver × Shared Presence × Trust × Depth × Continuity = Actual Connection Strength."></b><br><span data-jp="深さは接触なしでは休眠し、接触は信頼なしでは単なる慣れに終わる。" data-en="Depth without exposure becomes dormant; exposure without trust becomes mere habituation."></span></div>
    </div>
    <div class="box">
      <h3 data-jp="ドライバーの死と生存" data-en="Driver Death / Survival"></h3>
      <div class="note"><span data-jp="関係は一度に全体が死ぬわけではない。ドライバーは死ぬ、残る、休眠する、回復する、または残存資本として残る：" data-en="Relationships do not die all at once. Drivers die, remain, go dormant, recover, or survive as residual capital:"></span> <b data-jp="活性／休眠／死亡／回復可能／残存" data-en="Active / Dormant / Dead / Recoverable / Residual"></b>。</div>
    </div>
    <div class="box">
      <h3 data-jp="信頼接地型感情理論" data-en="Trust-Grounded Emotion Theory"></h3>
      <div class="note" data-jp="安心は土壌、信頼は根、感情は花、共有履歴は年輪である。感情は信頼より先に発火しうるが、信頼より先に深まった感情は、根のない花である。" data-en="Safety is soil, trust is roots, emotion is the flower, shared history is the tree ring. Emotion can ignite before trust, but emotion that deepens before trust is a flower without roots."></div>
    </div>
  </div>
  <div class="footer" data-jp="HCEは、記憶を持つ関係システム理論である。最終更新：2026/07/05｜著者：Haruno Ayukai / Clair de Lune" data-en="HCE is a memory-bearing relational systems theory. Last update: 2026/07/05｜Author: Haruno Ayukai / Clair de Lune"></div>
</div>

let lang = "jp";
const qBadges = {jp:["共在","信頼","深さ","継続性"],en:["Shared Presence","Trust","Depth","Continuity"]};

function renderMatrix(){
  const body = document.getElementById("matrixBody");
  const phaseSpans = {0:3, 3:3, 6:3, 9:2, 11:1};
  const phaseNumbers = [1,1,1,2,2,2,3,3,3,4,4,5];
  body.innerHTML = stages.map((s,index) => {
    const phaseCell = phaseSpans[index]
      ? `<td class="phaseCell" rowspan="${phaseSpans[index]}">${s.phase[lang]}</td>`
      : "";
    const phaseStartClass = phaseSpans[index] ? " phase-start" : "";
    return `
    <tr class="phase-${phaseNumbers[index]}${phaseStartClass}">
      ${phaseCell}
      <td class="stage">${s.stage[lang]}<small>${s.stageNo}</small></td>
      <td>${s.def[lang]}</td>
      <td class="drivers">${s.drivers[lang]}</td>
      <td class="mechanism">${s.mech[lang]}</td>
      <td class="method">${s.method[lang]}</td>
      <td>${qBadges[lang].map(b=>`<span class="badge">${b}</span>`).join("")}</td>
      <td class="question">${s.q[lang]}</td>
    </tr>`;
  }).join("");
}
function applyStaticText(){
  document.querySelectorAll("[data-jp]").forEach(el=>{
    el.innerHTML = lang === "jp" ? el.getAttribute("data-jp") : el.getAttribute("data-en");
  });
}

function setLang(l){
  lang = (l === "jp") ? "jp" : "en";
  document.getElementById("btnJP").classList.toggle("active", lang==="jp");
  document.getElementById("btnEN").classList.toggle("active", lang==="en");
  document.documentElement.lang = (lang==="jp") ? "ja" : "en";
  localStorage.setItem("hce-lang", lang);
  const url = new URL(window.location.href);
  url.searchParams.set("lang", lang);
  history.replaceState(null, "", url.pathname + url.search + url.hash);
  document.querySelectorAll(".matrix-return").forEach(a => a.href = a.dataset.page + "?lang=" + lang);
  applyStaticText();
  renderMatrix();
}

document.getElementById("btnJP").addEventListener("click", ()=>setLang("jp"));
document.getElementById("btnEN").addEventListener("click", ()=>setLang("en"));

const requestedLang = new URLSearchParams(window.location.search).get("lang");
setLang(requestedLang || localStorage.getItem("hce-lang") || "en");
